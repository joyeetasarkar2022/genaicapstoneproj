services:
  - type: web
    name: rag-capstone-agentjo
    runtime: python
    plan: free

    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install --prefer-binary -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/v1/health

    disk:
      name: rag-data
      mountPath: /var/data
      sizeGB: 5

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5

      - key: APP_ENV
        value: render

      - key: DOC_DIR
        value: /var/data/doc

      - key: CHROMA_PATH
        value: /var/data/vector_db

      - key: CHROMA_COLLECTION
        value: rag_capstone_docs

      - key: MAX_UPLOAD_SIZE_MB
        value: "20"

      - key: CHUNK_SIZE_TOKENS
        value: "200"

      - key: CHUNK_OVERLAP_TOKENS
        value: "30"

      - key: SIMILARITY_TOP_K
        value: "5"

      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2

      - key: LLM_MODEL
        value: gpt-4o-mini

      - key: AGENT_VERBOSE
        value: "false"

      - key: AGENT_MAX_ITERATIONS
        value: "8"

      - key: LOG_LEVEL
        value: INFO

      - key: OPENAI_API_KEY
        sync: false
